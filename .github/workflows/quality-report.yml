name: publish quality report

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore: ["quality/data/**"]

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node quality/generate-report.mjs
      - name: Publish generated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add quality/data
          git diff --cached --quiet || git commit -m "chore: update quality report [skip ci]"
          git push
