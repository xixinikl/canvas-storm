<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CanvasStorm - 头脑风暴画布</title>
<style>
:root {
  --bg: #f0f2f5; --surface: #fafbfc; --surface2: #eef0f2;
  --border: #e0e3e8; --text: #1b1e24; --text2: #6b7280;
  --accent: #4361ee; --accent-light: #eff2ff;
  --green: #059669; --orange: #d97706;
  --red: #dc2626; --purple: #7c3aed;
  --node-bg: #ffffff;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.06);
  --shadow-lg: 0 12px 36px rgba(0,0,0,0.08);
  --radius: 12px; --radius-sm: 8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;
  height:100vh;overflow:hidden;user-select:none;display:flex;flex-direction:column;
}

/* 顶栏 */
.toolbar{
  height:44px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:8px;
  z-index:100;flex-shrink:0;box-shadow:var(--shadow-sm);
}
.toolbar .logo{font-weight:800;font-size:14px;letter-spacing:-0.02em;color:var(--text)}
.toolbar .logo span{color:var(--accent)}
.toolbar .sep{width:1px;height:18px;background:var(--border);margin:0 4px}
.tb{
  padding:5px 10px;border:none;border-radius:var(--radius-sm);
  background:transparent;color:var(--text2);font-size:11px;
  cursor:pointer;transition:all 0.15s;font-weight:500;white-space:nowrap;
  display:flex;align-items:center;gap:4px;
}
.tb:hover{background:var(--surface2);color:var(--text)}
.tb.pri{background:var(--accent);color:#fff;font-weight:600}
.tb.pri:hover{filter:brightness(1.08)}
.tb.warn:hover{background:rgba(220,38,38,0.08);color:var(--red)}
.tb:disabled{opacity:0.35;pointer-events:none}
.spacer{flex:1}
.zoom-info{font-size:11px;color:var(--text2);min-width:46px;text-align:center;background:var(--surface2);border-radius:var(--radius-sm);padding:3px 8px}

/* 主体 */
.main-layout{flex:1;display:flex;overflow:hidden;position:relative}

/* 左侧会话面板 */
.session-panel{
  width:240px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;transition:width 0.25s;
}
.session-panel.collapsed{width:0;overflow:hidden;border-right:none}
.session-panel .sp-header{
  padding:12px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.sp-header h3{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em}
.sp-header .new-session-btn{
  width:26px;height:26px;border:none;border-radius:var(--radius-sm);background:var(--accent);color:#fff;
  font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:filter 0.15s;
}
.sp-header .new-session-btn:hover{filter:brightness(1.1)}
.session-list{flex:1;overflow-y:auto;padding:6px}
.session-item{
  padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:2px;
  border:1px solid transparent;transition:all 0.15s;display:flex;align-items:center;gap:8px;
}
.session-item:hover{background:var(--surface2)}
.session-item.active{background:var(--accent-light);border-color:var(--accent)}
.session-item .s-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--accent)}
.session-item .s-info{flex:1;min-width:0}
.session-item .s-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-item .s-meta{font-size:10px;color:var(--text2);margin-top:2px}
.session-item .s-del{
  width:20px;height:20px;border:none;border-radius:3px;background:transparent;color:var(--text2);
  cursor:pointer;font-size:13px;opacity:0;transition:all 0.15s;flex-shrink:0;
}
.session-item:hover .s-del{opacity:1}
.session-item .s-del:hover{background:rgba(220,38,38,0.08);color:var(--red)}

/* 画布区 */
.canvas-wrapper{flex:1;position:relative;overflow:hidden}
.canvas-container{
  width:100%;height:100%;position:relative;overflow:hidden;
  cursor:grab;background:var(--bg);
}
.canvas-container:active{cursor:grabbing}
.canvas-container.panning{cursor:grabbing}
.canvas-layer{position:absolute;top:0;left:0;transform-origin:0 0;width:12000px;height:12000px}
.edges-svg{position:absolute;top:0;left:0;width:12000px;height:12000px;pointer-events:none;z-index:0}

/* 网格背景（圆点图案） */
.grid-bg{
  position:absolute;top:0;left:0;width:12000px;height:12000px;
  pointer-events:none;z-index:-1;
  background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.22;
}

/* 输入引导遮罩 */
.entry-overlay{
  position:absolute;inset:0;z-index:400;
  background:rgba(240,242,245,0.94);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);transition:opacity 0.4s,visibility 0.4s;
}
.entry-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
.entry-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:36px 30px;width:460px;
  display:flex;flex-direction:column;gap:14px;
  box-shadow:var(--shadow-lg);
}
.entry-card h2{font-size:24px;font-weight:800;text-align:center;letter-spacing:-0.02em;margin:0}
.entry-card h2 span{color:var(--accent)}
.entry-card .sub{text-align:center;font-size:12px;color:var(--text2);margin:-4px 0 4px}
.entry-card .field-label{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:-8px}
.entry-card textarea{
  width:100%;min-height:90px;background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);padding:12px;font-size:13px;
  resize:vertical;font-family:inherit;line-height:1.65;
}
.entry-card textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,97,238,0.08)}
.entry-card textarea::placeholder{color:var(--text2)}
.param-row{display:flex;gap:8px;align-items:flex-end}
.param-item{display:flex;flex-direction:column;gap:4px}
.param-label{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.param-item input{
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);padding:8px 12px;font-size:13px;
  text-align:center;font-weight:600;
}
.param-item input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,97,238,0.08)}
.param-row select{
  flex:1;background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);padding:8px 12px;font-size:13px;cursor:pointer;
}
.param-row select:focus{outline:none;border-color:var(--accent)}
.btn-launch{
  width:100%;padding:12px;border:none;border-radius:var(--radius);
  background:var(--accent);color:#fff;font-weight:700;font-size:14px;
  cursor:pointer;transition:all 0.15s;
}
.btn-launch:hover{filter:brightness(1.08)}
.btn-launch:active{transform:scale(0.98)}
.btn-launch.loading{opacity:0.7;pointer-events:none}
.entry-footer{text-align:center;font-size:10px;color:var(--text2);line-height:1.6}

/* 节点 */
.node{
  position:absolute;z-index:10;background:var(--node-bg);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px 14px 14px;width:240px;cursor:pointer;
  transition:border-color 0.2s,box-shadow 0.2s,transform 0.15s;
  box-shadow:var(--shadow-sm);
  border-left:3px solid var(--border);
}
.node:hover{
  border-color:var(--accent);border-left-color:var(--accent);
  box-shadow:var(--shadow-md);transform:translateY(-1px);
}
.node.root{
  width:380px;padding:18px 20px 16px 18px;
  background:var(--node-bg);
  border-color:var(--accent);border-left-color:var(--accent);
  box-shadow:var(--shadow-md);
}
.node.selected{
  border-color:var(--accent);border-left-color:var(--accent);
  box-shadow:0 0 0 2px rgba(67,97,238,0.2),var(--shadow-md);
}
.node.thinking{
  animation:thinking-pulse 1.8s ease-in-out infinite;
}
@keyframes thinking-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,0.35),var(--shadow-md);border-color:rgba(124,58,237,0.5)}
  50%{box-shadow:0 0 0 12px rgba(124,58,237,0),var(--shadow-md);border-color:var(--purple)}
}
.node .node-title{
  font-size:13px;font-weight:700;margin-bottom:5px;
  display:flex;align-items:flex-start;gap:7px;line-height:1.4;
  color:var(--text);
}
.node.root .node-title{font-size:17px}
.node .node-title .icon{font-size:15px;flex-shrink:0;margin-top:1px;opacity:0.85}
.node .node-desc{font-size:11px;color:var(--text2);line-height:1.55;margin-bottom:10px}
.node .scores{display:flex;flex-direction:column;gap:4px}
.score-row{display:flex;align-items:center;gap:7px;font-size:10px}
.score-label{width:22px;color:var(--text2);text-align:right;flex-shrink:0;font-size:10px;font-weight:500}
.score-track{flex:1;height:4px;background:var(--surface2);border-radius:3px;overflow:hidden}
.score-fill{height:100%;border-radius:3px}
.score-fill.diff{background:var(--red)}
.score-fill.inno{background:var(--purple)}
.score-fill.prac{background:var(--green)}
.score-val{width:26px;font-size:10px;text-align:left;font-weight:600;color:var(--text)}

.node .category-tag{
  font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;
  padding:2px 8px;border-radius:10px;
  display:inline-flex;align-items:center;gap:3px;
  background:var(--accent-light);color:var(--accent);
}

.node .thinking-badge{
  display:flex;align-items:center;gap:8px;font-size:12px;color:var(--purple);
  margin-top:10px;font-weight:700;padding:8px 12px;
  background:rgba(124,58,237,0.06);border-radius:8px;
}

/* 上下文菜单 */
.ctx-menu{
  position:fixed;z-index:500;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow-lg);padding:4px;min-width:140px;
  animation:menuIn 0.12s ease-out;
}
@keyframes menuIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
.ctx-menu-item{
  padding:8px 12px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:background 0.1s;font-weight:500;
}
.ctx-menu-item:hover{background:var(--accent-light)}
.ctx-menu-item .mi-icon{font-size:14px;width:18px;text-align:center}
.ctx-menu-item .mi-label{flex:1}
.ctx-menu-item .mi-short{font-size:10px;color:var(--text2)}
.ctx-menu-item.delete:hover{background:rgba(220,38,38,0.06);color:var(--red)}
.ctx-menu-sep{height:1px;background:var(--border);margin:4px 0}

/* Toast */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:var(--text);color:#fff;border-radius:8px;
  padding:10px 22px;font-size:12px;font-weight:500;
  opacity:0;transition:opacity 0.3s;z-index:999;pointer-events:none;
  box-shadow:0 4px 16px rgba(0,0,0,0.2);
}
.toast.show{opacity:1}

/* 加载脉冲 */
@keyframes thinking-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,0.3)}
  50%{box-shadow:0 0 0 8px rgba(124,58,237,0)}
}

@keyframes nodeIn{
  from{opacity:0;transform:scale(0.7) translateY(8px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
.node.new{animation:nodeIn 0.4s cubic-bezier(0.34,1.56,0.64,1)}

/* 脉冲点动画 */
@keyframes dot-bounce{
  0%,80%,100%{transform:scale(0)}
  40%{transform:scale(1)}
}
.thinking-dots{display:inline-flex;gap:3px;align-items:center}
.thinking-dots span{
  width:5px;height:5px;background:var(--purple);border-radius:50%;
  display:inline-block;animation:dot-bounce 1.2s infinite ease-in-out;
}
.thinking-dots span:nth-child(2){animation-delay:0.15s}
.thinking-dots span:nth-child(3){animation-delay:0.3s}

.spinner{
  display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.25);
  border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* 全局思考状态栏 */
.thinking-bar{
  width:100%;padding:10px 0;
  background:linear-gradient(90deg,rgba(124,58,237,0.12),rgba(124,58,237,0.18),rgba(124,58,237,0.12));
  border-bottom:1px solid rgba(124,58,237,0.25);
  animation:bar-shimmer 2s ease-in-out infinite;
}
@keyframes bar-shimmer{
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}
.thinking-bar-inner{
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:14px;font-weight:600;color:var(--purple);
}
.thinking-bar-dots{display:flex;gap:5px;align-items:center}
.thinking-bar-dots span{
  display:block;width:8px;height:8px;border-radius:50%;background:var(--purple);
  animation:bar-dot 1.2s ease-in-out infinite;
}
.thinking-bar-dots span:nth-child(2){animation-delay:0.15s}
.thinking-bar-dots span:nth-child(3){animation-delay:0.3s}
@keyframes bar-dot{
  0%,80%,100%{opacity:0.2;transform:scale(0.7)}
  40%{opacity:1;transform:scale(1.2)}
}
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="toolbar">
  <div class="logo">Canvas<span>Storm</span></div>
  <div class="sep"></div>
  <button class="tb" onclick="toggleSessionPanel()">&#x2630; 会话列表</button>
  <button class="tb" id="btnUndo" onclick="undo()" disabled>&#x21A9; 撤回</button>
  <button class="tb pri" onclick="addManualNode()">+ 添加节点</button>
  <button class="tb" onclick="tidyLayout()">&#x25F0; 整理布局</button>
  <button class="tb" onclick="fitView()">&#x2316; 适应画布</button>
  <button class="tb" onclick="resetZoom()">1:1</button>
  <button class="tb" onclick="exportMD()">导出MD</button>
  <span class="spacer"></span>
  <span class="zoom-info" id="zoomInfo">100%</span>
</div>

<!-- 全局思考状态栏 -->
<div class="thinking-bar" id="thinkingBar" style="display:none">
  <div class="thinking-bar-inner">
    <span class="thinking-bar-dots"><span></span><span></span><span></span></span>
    大模型正在思考中，请稍候...
  </div>
</div>

<div class="main-layout">

  <!-- 左侧会话面板 -->
  <div class="session-panel" id="sessionPanel">
    <div class="sp-header">
      <h3>我的会话</h3>
      <button class="new-session-btn" onclick="createNewSession()" title="新建会话">+</button>
    </div>
    <div class="session-list" id="sessionList"></div>
  </div>

  <!-- 画布 -->
  <div class="canvas-wrapper">
    <div class="canvas-container" id="canvasContainer">
      <div class="grid-bg"></div>
      <div class="canvas-layer" id="canvasLayer">
        <svg class="edges-svg" id="edgesSvg"></svg>
      </div>

      <!-- 输入引导遮罩 -->
      <div class="entry-overlay" id="entryOverlay">
        <div class="entry-card">
          <h2>Canvas<span>Storm</span></h2>
          <p class="sub">输入项目想法，AI 帮你发散创新功能点（Key 已配置在后端）</p>
          <div class="field-label">描述你的项目</div>
          <textarea id="projectInput" placeholder="例如：一个面向独立开发者的项目管理工具，需要任务看板、时间追踪、自动排期..."></textarea>
          <div class="param-row">
            <div class="param-item">
              <span class="param-label">生成数量</span>
              <input type="number" id="countInput" value="6" min="2" max="15" style="width:60px">
            </div>
            <select id="styleSelect">
              <option value="balanced">均衡发散</option>
              <option value="bold">大胆创新</option>
              <option value="practical">务实优先</option>
            </select>
          </div>
          <button class="btn-launch" id="btnLaunch" onclick="launchSession()">&#x2728; 开始发散</button>
          <p class="entry-footer">点击节点弹出操作菜单 · 滚轮缩放 · 拖拽平移 · Ctrl+Z 撤回</p>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>
<div class="ctx-menu" id="ctxMenu" style="display:none"></div>

<script>
// ============ 存储层 ============
const SESSIONS_KEY='cs_sessions', ACTIVE_KEY='cs_active';
const MID=6000;
const API_BASE=(()=>{
  if(location.hostname==='localhost'||location.hostname==='127.0.0.1')return 'http://localhost:3000/api';
  return '/api';
})();
var apiOnline=false;

async function apiFetch(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(API_BASE+path,opts);
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

// 启动时探测后端 + 拉取远程数据（远程优先）
async function pullRemoteSessions(){
  try{await apiFetch('GET','/health');apiOnline=true;console.log('[pull] API online, health OK')}catch(e){console.warn('[pull] health check failed:',e.message);return}
  try{
    const list=await apiFetch('GET','/sessions');
    console.log('[pull] sessions list:',list);
    if(list.code===200&&list.data.length){
      const full=[];
      for(const s of list.data){
        const r=await apiFetch('GET',`/sessions/${s.id}`);
        console.log('[pull] session',s.id,r.code);
        if(r.code===200)full.push(r.data);
      }
      localStorage.setItem(SESSIONS_KEY,JSON.stringify(full));
      console.log('[pull] synced',full.length,'sessions to localStorage');
    }
  }catch(e){apiOnline=false}
}

function loadSessions(){try{return JSON.parse(localStorage.getItem(SESSIONS_KEY)||'[]')}catch(e){return[]}}
function saveSessions(s){localStorage.setItem(SESSIONS_KEY,JSON.stringify(s))}
function getActiveId(){return localStorage.getItem(ACTIVE_KEY)}
function setActiveId(id){localStorage.setItem(ACTIVE_KEY,id)}

// ============ 运行时状态 ============
var currentSession=null, selectedId=null;
let zoom=1, panX=0, panY=0;
const MAX_UNDO=50;
let undoStack=[];

// DOM
const canvasContainer=document.getElementById('canvasContainer');
const canvasLayer=document.getElementById('canvasLayer');
const edgesSvg=document.getElementById('edgesSvg');
const zoomInfo=document.getElementById('zoomInfo');
const entryOverlay=document.getElementById('entryOverlay');
const ctxMenu=document.getElementById('ctxMenu');
const btnUndo=document.getElementById('btnUndo');

// ============ 撤回系统 ============
function pushUndo() {
  if(!currentSession) return;
  undoStack.push({
    nodes: JSON.parse(JSON.stringify(currentSession.nodes)),
    edges: JSON.parse(JSON.stringify(currentSession.edges)),
    nextId: currentSession.nextId,
  });
  if(undoStack.length>MAX_UNDO) undoStack.shift();
  updateUndoButton();
}
function undo() {
  if(undoStack.length===0) return;
  const snap=undoStack.pop();
  currentSession.nodes=snap.nodes;
  currentSession.edges=snap.edges;
  currentSession.nextId=snap.nextId;
  selectedId=null;
  saveCurrentSession();
  renderAll();
  closeContextMenu();
  updateUndoButton();
  showToast('已撤回');
}
function updateUndoButton(){btnUndo.disabled=undoStack.length===0}

// ============ 会话管理 ============
function createNewSession(){
  const name=prompt('输入会话名称：');
  if(!name||!name.trim())return;
  const id='cs_'+Date.now();
  const newSession={id,name:name.trim(),nodes:[],edges:[],nextId:1,createdAt:new Date().toISOString()};
  const sessions=loadSessions();
  sessions.unshift(newSession);
  saveSessions(sessions);
  if(apiOnline){
    (async()=>{try{await apiFetch('POST','/sessions',newSession)}catch(e){apiOnline=false}})();
  }
  switchToSession(id);
  // 空会话 → 显示输入引导
  entryOverlay.classList.remove('hidden');
  document.getElementById('projectInput').value='';
  document.getElementById('projectInput').focus();
  showToast('请输入项目想法，然后点击「开始发散」');
}
function switchToSession(id){
  const sessions=loadSessions();
  const session=sessions.find(s=>s.id===id);
  if(!session)return;
  setActiveId(id);
  currentSession=JSON.parse(JSON.stringify(session));
  selectedId=null;undoStack=[];
  const hasNodes=currentSession.nodes&&currentSession.nodes.length>0;
  if(hasNodes){
    entryOverlay.classList.add('hidden');
    tidyLayout().then(() => {
      updateUndoButton();
      renderSessionList();
      fitView();
    });
  } else {
    entryOverlay.classList.remove('hidden');
    document.getElementById('projectInput').focus();
  }
  if(!hasNodes) { renderAll(); updateUndoButton(); renderSessionList(); }
}
function saveCurrentSession(){
  if(!currentSession)return;
  const sessions=loadSessions();

// ============ 节点布局算法（Buchheim non-layered tidy tree / XMind Standard） ============
// 参考: leungwensen/mindmap-layouts, "Drawing Non-layered Tidy Trees in Linear Time" (Buchheim 2006)

const PEM = 18;
// 节点原始尺寸（层级越深越小）；之后 addGap 会加 hgap/vgap
function getNodeRawSize(d) {
  if (d === 0) return {w: 380, h: 200};
  if (d === 1) return {w: 240, h: 160};
  if (d === 2) return {w: 200, h: 130};
  return {w: 170, h: 110};
}
function getHGap(d) { return d <= 1 ? 80 : 50; }
function getVGap(d) { return d <= 1 ? 24 : 16; }

// ---- TreeNode（包含布局所需完整属性）----
function buildTreeNode(flatNode, depth) {
  const raw = getNodeRawSize(depth);
  const hgap = getHGap(depth), vgap = getVGap(depth);
  return {
    id: flatNode.id,
    depth,
    width: raw.w,         // 原始宽（addGap 后再扩展）
    height: raw.h,
    hgap, vgap,
    x: 0, y: 0,
    children: [],
    parent: null,
    _rawW: raw.w, _rawH: raw.h,
  };
}

function buildTree(rootId, depth, nmap, vis) {
  if (vis.has(rootId)) return null;
  vis.add(rootId);
  const fn = nmap.get(rootId);
  if (!fn || fn._hidden) return null;
  const tn = buildTreeNode(fn, depth);
  const kids = currentSession.nodes.filter(n => n.parentId === rootId && !n._hidden);
  kids.forEach(k => {
    const c = buildTree(k.id, depth + 1, nmap, vis);
    if (c) { c.parent = tn; tn.children.push(c); }
  });
  return tn;
}

// ---- mindmap-layouts API bridge ----
// 将前端 TreeNode 转为纯 JSON（发给服务端布局 API）
function treeToJSON(tn) {
  const obj = { id: tn.id, depth: tn.depth };
  if (tn.children.length) obj.children = tn.children.map(treeToJSON);
  return obj;
}

async function xmindLayout() {
  if (!currentSession) return;
  const root = currentSession.nodes.find(n => n.parentId === null);
  if (!root) return;
  const nmap = new Map();
  currentSession.nodes.forEach(n => { nmap.set(n.id, n); n._hidden = (n._expanded === false); });

  const rootKids = currentSession.nodes.filter(n => n.parentId === root.id && !n._hidden);

  // 构建完整树（Standard 布局会内部做左右分割）
  const vis = new Set();
  const fullTree = buildTreeNode(root, 0);
  for (const kid of rootKids) {
    const c = buildTree(kid.id, 1, nmap, vis);
    if (c) { c.parent = fullTree; fullTree.children.push(c); }
  }

  try {
    const resp = await fetch('/api/layout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ root: treeToJSON(fullTree) })
    });
    const data = await resp.json();
    if (data.error) { console.error('Layout API error:', data.error); return; }

    // layout.getNodes() 返回: {id, x, y, hgap, vgap, actualWidth, actualHeight, depth}
    // 前端 flat node 位置 = 内部左上角 = x+hgap, y+vgap
    const layoutMap = new Map();
    for (const ln of data.nodes) {
      ln._ix = ln.x + ln.hgap;
      ln._iy = ln.y + ln.vgap;
      ln._rw = ln.actualWidth;
      ln._rh = ln.actualHeight;
      layoutMap.set(ln.id, ln);
    }

    for (const fn of currentSession.nodes) {
      if (fn._hidden) continue;
      const ln = layoutMap.get(fn.id);
      if (ln) {
        fn._depth = ln.depth;
        fn.x = ln._ix;
        fn.y = ln._iy;
        fn._layoutW = ln._rw;
        fn._layoutH = ln._rh;
      }
    }
  } catch (err) {
    console.error('Layout failed:', err);
  }
  currentSession.nodes.forEach(n => { delete n._hidden; });
}

async function tidyLayout() {
  if (!currentSession) return;
  pushUndo();
  await xmindLayout();
  saveCurrentSession();
  renderAll();
  showToast('布局已整理');
}
function layoutChildren(pid) { return xmindLayout(); }

function buildSystemPrompt(style){
  const styleMap={
    balanced:'发散时难度、创新、实用各维度均匀分布。',
    bold:'优先产出高创新度(≥7分)的功能点。不少于一半的创新度≥7。',
    practical:'优先产出高实用(≥7分)+低难度(≤5分)的功能点。',
  };
  return `你是顶级产品策略顾问，专门做"扎根式功能发散"。

## 核心规则
1. 只能围绕用户描述的项目领域延伸，不得偏离核心场景。
2. 批内功能点必须差异化，本质相同的只保留更好的。

## 评分标准
创新度 1-10：1-3=市场标配，4-6=少量竞品有，7-8=鲜有同类，9-10=开创性。
难度 1-10：1-3=几小时纯前端，4-6=1-2周需后端，7-8=1-2月复杂系统，9-10=自研模型/硬件。
实用度 1-10：1-3=少数人偶尔用，4-6=部分用户需要，7-8=多数目标用户需要，9-10=核心刚需。

## 输出格式
只输出纯JSON数组，无markdown包裹。每个元素：
{"name":"≤10字","desc":"25-50字","difficulty":整数,"innovation":一位小数,"practicality":一位小数,"category":"AI/ML|交互体验|效率工具|协作社交|数据分析|增长留存","impl_note":"15-30字技术方案"}

风格：${styleMap[style]||styleMap.balanced}`;
}

function buildUserPrompt(userInput,count,depthContext){
  return `项目：${userInput}\n\n生成 ${count} 个功能点。${depthContext||''}`;
}

async function callDeepSeek(systemPrompt,userPrompt){
  const resp=await apiFetch('POST','/storm',{systemPrompt,userPrompt,temperature:0.8,max_tokens:4096});
  if(resp.code!==200)throw new Error(resp.error||'API 调用失败');
  return resp.data?.choices?.[0]?.message?.content||'';
}

function parseIdeasFromResponse(content){
  let json=content.trim();
  const match=json.match(/```(?:json)?\s*([\s\S]*?)```/);
  if(match)json=match[1].trim();
  try{const ideas=JSON.parse(json);if(Array.isArray(ideas))return ideas}catch(e){}
  const arrMatch=json.match(/\[[\s\S]*\]/);
  if(arrMatch)try{return JSON.parse(arrMatch[0])}catch(e2){}
  throw new Error('无法解析AI返回的数据');
}

async function divergeNodeAPI(nodeId){
  if(!currentSession)return;
  const node=currentSession.nodes.find(n=>n.id===nodeId);
  if(!node)return;
  const count=parseInt(document.getElementById('countInput').value);
  const style=document.getElementById('styleSelect').value;
  const isRoot=node.parentId===null;

  try{
    const systemPrompt=buildSystemPrompt(style);
    const depthContext=isRoot?'':`基于"${node.name}"做深度延伸子功能。`;
    const userPrompt=buildUserPrompt(isRoot?node.desc:node.name,count,depthContext);
    const content=await callDeepSeek(systemPrompt,userPrompt);
    const ideas=parseIdeasFromResponse(content);
    await addChildren(nodeId,ideas);
    return true;
  }catch(err){
    console.error(err);
    showToast('API调用失败：'+err.message+'，使用本地备用数据');
    addChildrenMock(nodeId);
    return false;
  }
}

async function addChildren(nodeId,ideas){
  if(!currentSession)return;
  pushUndo();

  // 清除 thinking 标记
  const parentNode=currentSession.nodes.find(n=>n.id===nodeId);
  if(parentNode) delete parentNode.thinking;

  ideas.forEach((idea,i)=>{
    const child={
      id:'n'+(currentSession.nextId++),parentId:nodeId,
      name:idea.name||'未命名',desc:idea.desc||'',
      difficulty:Math.max(1,Math.min(10,Math.round(idea.difficulty||5))),
      innovation:Math.max(1,Math.min(10,parseFloat((idea.innovation||5).toFixed(1)))),
      practicality:Math.max(1,Math.min(10,parseFloat((idea.practicality||5).toFixed(1)))),
      category:idea.category||'效率工具',impl_note:idea.impl_note||'',
      x:0,y:0,
    };
    currentSession.nodes.push(child);
    currentSession.edges.push({from:nodeId,to:child.id});
  });

  // 布局
  await layoutChildren(nodeId);

  saveCurrentSession();
  renderAll();

  // 渐入动画
  ideas.forEach((_,i)=>{
    const childId='n'+(currentSession.nextId-ideas.length+i);
    setTimeout(()=>{
      const el=document.getElementById(childId);
      if(el)el.classList.add('new');
    },i*60);
  });

  updateUndoButton();
  showToast(`已发散 ${ideas.length} 个功能点`);
}

function renderEdges(){
  if(!currentSession){edgesSvg.innerHTML='';return}
  let svg='';
  currentSession.edges.forEach(e=>{
    const fn=currentSession.nodes.find(n=>n.id===e.from);
    const tn=currentSession.nodes.find(n=>n.id===e.to);
    if(!fn||!tn)return;
    const fromDepth = (fn._depth !== undefined) ? fn._depth : (fn.parentId===null ? 0 : 1);
    const toDepth = (tn._depth !== undefined) ? tn._depth : (tn.parentId===null ? 0 : 1);
    const fw = fn._layoutW || getNodeRawSize(fromDepth).w;
    const fh = fn._layoutH || getNodeRawSize(fromDepth).h;
    const tw = tn._layoutW || getNodeRawSize(toDepth).w;
    const th = tn._layoutH || getNodeRawSize(toDepth).h;
    const fx=fn.x+fw/2, fy=fn.y+fh/2;
    const tx=tn.x+tw/2, ty=tn.y+th/2;
    const cx1=fx+(tx-fx)*0.45, cy1=fy;
    const cx2=tx-(tx-fx)*0.45, cy2=ty;
    svg+=`<path d="M${fx},${fy} C${cx1},${cy1} ${cx2},${cy2} ${tx},${ty}" stroke="#bcc3ce" stroke-width="1.5" fill="none" stroke-dasharray="6,4" opacity="0.5"/>`;
  });
  edgesSvg.innerHTML=svg;
}

    <div class="ctx-menu-sep"></div>
    <div class="ctx-menu-item delete" onclick="closeContextMenu();deleteNode('${node.id}')">
      <span class="mi-icon">×</span><span class="mi-label">删除节点</span><span class="mi-short">Del</span>
    </div>`;
  ctxMenu.style.display='block';
  // 确保菜单在视口内
  const mw=ctxMenu.offsetWidth||150, mh=ctxMenu.offsetHeight||100;
  let lx=x, ly=y;
  if(x+mw>window.innerWidth)lx=window.innerWidth-mw-8;
  if(y+mh>window.innerHeight)ly=window.innerHeight-mh-8;
  ctxMenu.style.left=lx+'px';
  ctxMenu.style.top=ly+'px';
}

function closeContextMenu(){ctxMenu.style.display='none'}
document.addEventListener('click',(e)=>{
  if(!ctxMenu.contains(e.target)&&!e.target.closest('.node'))closeContextMenu();
});

// ============ 节点操作 ============
function addManualNode(){
  if(!currentSession) return showToast('请先创建或选择会话');
  const name = prompt('请输入节点名称（≤15字）：');
  if(!name || !name.trim()) return;
  const trimmed = name.trim().substring(0,15);
  pushUndo();

  const parentId = selectedId || null;
  // 自动计算位置：有父节点则放在父节点附近，无则放画布可见区域中心
  let x = 0, y = 0;
  if(parentId){
    const parent = currentSession.nodes.find(n=>n.id===parentId);
    if(parent){ x = parent.x + 280; y = parent.y; }
  } else {
    // 画布可见中心（考虑当前缩放和平移）
    const wrapper = document.querySelector('.canvas-wrapper');
    const r = wrapper.getBoundingClientRect();
    const layer = document.querySelector('.canvas-layer');
    const tx = parseFloat(layer.style.transform.replace(/[^0-9\-.,]/g,'').split(',')[4]||0);
    const ty = parseFloat(layer.style.transform.replace(/[^0-9\-.,]/g,'').split(',')[5]||0);
    x = (r.width/2 - tx) / zoom - 190;
    y = (r.height/2 - ty) / zoom - 100;
  }

  const newNode = {
    id: 'mn'+(currentSession.nextId++),
    parentId,
    name: trimmed,
    desc: '',
    difficulty: 5, innovation: 5, practicality: 5,
    category: '效率工具',
    x, y,
  };
  currentSession.nodes.push(newNode);
  if(parentId) currentSession.edges.push({from:parentId, to:newNode.id});

  if(parentId) layoutChildren(parentId).then(() => {
    saveCurrentSession();
    renderAll();
    updateUndoButton();
    showToast('已添加节点：'+trimmed);
  });
  else {
    saveCurrentSession();
    renderAll();
    updateUndoButton();
    showToast('已添加节点：'+trimmed);
  }
}

function divergeNode(nodeId){
  if(!currentSession)return;
  const node=currentSession.nodes.find(n=>n.id===nodeId);
  if(!node)return;
  // 设置思考中标记
  node.thinking=true;
  saveCurrentSession();
  renderAll();
  divergeNodeAPI(nodeId);
}

function deleteNode(nodeId){
  if(!currentSession)return;
  const node=currentSession.nodes.find(n=>n.id===nodeId);
  if(!node||node.parentId===null)return; // 不能删根节点

  pushUndo();

  // 递归删除子节点
  const delRecursive=(id)=>{
    currentSession.nodes.filter(n=>n.parentId===id).forEach(c=>{
      delRecursive(c.id);
      currentSession.nodes=currentSession.nodes.filter(n=>n.id!==c.id);
      currentSession.edges=currentSession.edges.filter(e=>e.to!==c.id);
    });
  };
  delRecursive(nodeId);
  currentSession.nodes=currentSession.nodes.filter(n=>n.id!==nodeId);
  currentSession.edges=currentSession.edges.filter(e=>e.from!==nodeId&&e.to!==nodeId);

  if(selectedId===nodeId)selectedId=null;
  renderAll();
  saveCurrentSession();
  updateUndoButton();
  showToast('已删除节点');
}

function selectNode(id){
  selectedId=id;
  document.querySelectorAll('.node').forEach(el=>el.classList.toggle('selected',el.dataset.nodeId===id));
}

// ============ 节点拖拽 ============
let dragNode=null, dsx,dsy,nsx,nsy,wasDragged=false;
function startNodeDrag(e,node){
  dragNode=node;wasDragged=false;
  dsx=e.clientX;dsy=e.clientY;nsx=node.x;nsy=node.y;
  selectNode(node.id);
}
window.addEventListener('mousemove',(e)=>{
  if(!dragNode)return;
  const dx=(e.clientX-dsx)/zoom, dy=(e.clientY-dsy)/zoom;
  if(Math.abs(dx)>2||Math.abs(dy)>2)wasDragged=true;
  dragNode.x=nsx+dx;dragNode.y=nsy+dy;
  const el=document.getElementById(dragNode.id);
  if(el){el.style.left=dragNode.x+'px';el.style.top=dragNode.y+'px'}
  renderEdges();
});
window.addEventListener('mouseup',()=>{
  if(dragNode&&wasDragged){
    pushUndo();
    saveCurrentSession();
    updateUndoButton();
  }
  dragNode=null;
});

// ============ 画布平移/缩放 ============
let isPanning=false, pStart, panOX, panOY;
canvasContainer.addEventListener('mousedown',(e)=>{
  if(e.target===canvasContainer||e.target.classList.contains('grid-bg')||e.target===canvasLayer||e.target===edgesSvg){
    isPanning=true;canvasContainer.classList.add('panning');
    pStart={x:e.clientX,y:e.clientY};panOX=panX;panOY=panY;
  }
});
window.addEventListener('mousemove',(e)=>{
  if(!isPanning)return;
  panX=panOX+(e.clientX-pStart.x);panY=panOY+(e.clientY-pStart.y);
  applyTransform();
});
window.addEventListener('mouseup',()=>{isPanning=false;canvasContainer.classList.remove('panning')});
canvasContainer.addEventListener('wheel',(e)=>{
  e.preventDefault();
  const rect=canvasContainer.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const oldZ=zoom;
  const newZ=Math.max(0.12,Math.min(3,oldZ*(1-e.deltaY*0.001)));
  panX=mx-(mx-panX)*(newZ/oldZ);
  panY=my-(my-panY)*(newZ/oldZ);
  zoom=newZ;applyTransform();
});
function applyTransform(){
  canvasLayer.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  zoomInfo.textContent=Math.round(zoom*100)+'%';
}

// ============ 视图 ============
function fitView(){
  if(!currentSession||currentSession.nodes.length===0)return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  currentSession.nodes.forEach(n=>{
    const depth = (n._depth !== undefined) ? n._depth : (n.parentId===null ? 0 : 1);
    const w = n._layoutW || getNodeRawSize(depth).w;
    const h = n._layoutH || getNodeRawSize(depth).h;
    if(n.x<minX)minX=n.x; if(n.y<minY)minY=n.y;
    if(n.x+w>maxX)maxX=n.x+w; if(n.y+h>maxY)maxY=n.y+h;
  });
  const rect=canvasContainer.getBoundingClientRect();
  const cw=maxX-minX+200,ch=maxY-minY+200;
  const zx=rect.width/cw,zy=rect.height/ch;
  zoom=Math.max(0.15,Math.min(zx,zy,1.2));
  panX=rect.width/2-(minX+cw/2)*zoom;
  panY=rect.height/2-(minY+ch/2)*zoom;
  applyTransform();
}
function resetZoom(){zoom=1;panX=0;panY=0;applyTransform()}

// ============ 导出 ============
function exportMD(){
  if(!currentSession||currentSession.nodes.length<=1){showToast('没有可导出的内容');return}
  const root=currentSession.nodes.find(n=>n.parentId===null);
  let md=`# ${root?.name||'头脑风暴'}\n\n> ${root?.desc||''}\n\n`;
  function w(pid,d){
    currentSession.nodes.filter(n=>n.parentId===pid).forEach(c=>{
      md+=`${'#'.repeat(Math.min(d+2,4))} ${c.name}\n\n`;
      md+=`- 分类: ${c.category}\n- 难度: ${c.difficulty}/10 · 创新: ${c.innovation}/10 · 实用: ${c.practicality}/10\n- ${c.desc}\n`;
      if(c.impl_note)md+=`- 实现: ${c.impl_note}\n`;
      md+='\n';w(c.id,d+1);
    });
  }
  if(root)w(root.id,0);
  downloadFile('brainstorm_'+currentSession.name.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g,'_')+'.md',md);
  showToast('已导出 Markdown');
}
function downloadFile(fn,ct){const b=new Blob([ct],{type:'text/plain'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=fn;a.click();URL.revokeObjectURL(u)}

// ============ Toast ============
let tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2200)}

// ============ 键盘 ============
window.addEventListener('keydown',(e)=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='f'||e.key==='F')fitView();
  if(e.key==='0')resetZoom();
  if((e.key==='z'||e.key==='Z')&&(e.metaKey||e.ctrlKey)){e.preventDefault();undo();return}
  if(e.key==='Delete'&&selectedId){
    deleteNode(selectedId);
  }
  if(e.key==='Escape')closeContextMenu();
});

// ============ 初始化 ============
async function init(){
  await pullRemoteSessions();
  const sessions=loadSessions();
  const activeId=getActiveId();
  let targetSession = null;
  if(activeId) targetSession=sessions.find(s=>s.id===activeId);
  if(!targetSession && sessions.length>0) targetSession=sessions[0];

  if(targetSession){
    switchToSession(targetSession.id);
    // switchToSession 内部会根据有无节点决定显示/隐藏 entryOverlay
  } else {
    entryOverlay.classList.remove('hidden');
  }
  renderSessionList();
}
init();
</script>
